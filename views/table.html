<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="/assets/static.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Table</title>
</head>

<body>
    <header>
        <div>
            <h1>Table.</h1>
        </div>
    </header>


    <main>
        <div class="respansive-table">
            <table>
                <caption>Dados de alunos</caption> <!-- Legenda da tabela -->
                <thead> <!-- table head ou o cabeçalho da tabela -->
                    <tr> <!-- table row ou linha do cabeçalho da tabela -->
                        <th scope="col">Pessoa</th> <!-- cabeçalho da linha da  -->
                        <th scope="col">Hobby</th> <!-- cabeçalho da linha da  -->
                        <th scope="col">Idade</th> <!-- cabeçalho da linha da  -->
                    </tr>
                </thead>
                <tbody> <!-- corpo da tabela -->
                    <tr> <!-- table row ou linha do corpo da tabela -->
                        <!-- "scope" serve para indicar se o conteudo e uma head ou um body -->
                        <th scope="row">Even</th> <!-- cabeçalho do corpo da tabela -->
                        <td>Pesca</td> <!-- conteudo simples do corpo da tabela -->
                        <td>13</td> <!-- conteudo simples do corpo da tabela -->
                    </tr>

                    <tr>
                        <th scope="row">Gian</th>
                        <td>Ler</td>
                        <td>12</td>
                    </tr>

                    <tr>
                        <th scope="row">Lia</th>
                        <td>Pintar</td>
                        <td>15</td>
                    </tr>
                </tbody>

                <tfoot>
                    <tr>
                        <th scope="row" colspan="2">Idade maior</th> <!-- "colspan" junta colunas -->
                        <td>15</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </main>
    <footer>
        <div>
            <h2>Table.</h2>
        </div>
    </footer>

</body>

</html>
