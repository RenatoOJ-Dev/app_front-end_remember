<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Style</title>
    <link rel="stylesheet" href="css/list_style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Sekuya&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>List Style</h1>
    </header>
    <main>
        <article>
            <h2>Tudo que vamos ver!</h2>
            <section>
                <ul>
                    <li>Lista não ordenada</li>
                    <li>Lista não ordenada</li>
                    <li>Lista não ordenada</li>
                    <li>Lista não ordenada</li>
                </ul>
            </section>
            <section>
                <ol>
                    <li>Lista ordenada</li>
                    <li>Lista ordenada</li>
                    <li>Lista ordenada</li>
                    <li>Lista ordenada</li>
                </ol>
            </section>
        </article>
    </main>

</body>

</html>
